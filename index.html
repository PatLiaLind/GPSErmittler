<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KM-Logger Ultra Single-Line</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin-bottom: 15px; border: 1px solid #333; }
        h2 { text-align: center; color: #007BFF; margin: 10px 0; }
        
        label { display: block; margin: 10px 0 5px 5px; font-size: 0.8em; color: #aaa; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; font-size: 18px; border-radius: 8px; border: 2px solid #444; background: #000; color: #00ff00; text-align: center; box-sizing: border-box; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 15px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; color: white; }
        .btn-km { background: #28a745; grid-column: span 2; font-size: 20px; }
        .btn-trace { background: #6f42c1; }
        .btn-stop { background: #dc3545; }
        .btn:disabled { background: #444; opacity: 0.6; }

        .status-box { min-height: 60px; text-align: center; margin: 10px 0; padding: 10px; border-radius: 8px; background: #252525; font-size: 0.9em; border: 1px solid #444; }
        
        .log-section { width: 100%; }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .log-area { width: 100%; background: #000; border-radius: 8px; border: 1px solid #333; height: 150px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #00ff00; margin-bottom: 10px; }
        .log-entry { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 5px; align-items: center; }
        .trace-entry { color: #b19cd9; } 
        
        .btn-x { background: #ff4444; color: white; border: none; border-radius: 4px; padding: 2px 8px; font-weight: bold; }
        .btn-copy { width: 100%; padding: 12px; background: #444; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 KM-Logger Dual-Mode</h2>
    
    <div class="card">
        <label>Autobahn wählen (Hauptlinie)</label>
        <select id="ab_select">
            <option value="A1">A1</option>
            <option value="A3">A3</option>
            <option value="A44">A44</option>
            <option value="A46" selected>A46</option>
            <option value="A57">A57</option>
            <option value="A59">A59</option>
            <option value="A535">A535</option>
            <option value="A542">A542</option>
        </select>

        <label>Manuelle KM-Eingabe (Schild)</label>
        <input type="number" id="km_input" inputmode="decimal" placeholder="z.B. 105.5">
        
        <div class="button-group">
            <button class="btn btn-km" onclick="savePoint(true)">📍 SCHILD LOGGEN</button>
            <button id="startTrace" class="btn btn-trace" onclick="toggleTracing(true)">🛰️ TRACE START</button>
            <button id="stopTrace" class="btn btn-stop" onclick="toggleTracing(false)" disabled>⏹️ STOP</button>
        </div>

        <div id="gps-status" class="status-box">Bereit.</div>
    </div>

    <div class="log-section">
        <div class="log-header">
            <span>Messprotokoll (Schilder):</span>
            <button class="btn-copy" style="width: auto; padding: 5px 15px;" onclick="copyLog()">📋 Alles Kopieren</button>
        </div>
        <div id="log-km" class="log-area"></div>
        <label>Kurven-Trace (Auto-Geometrie):</label>
        <div id="log-trace" class="log-area"></div>
    </div>
</div>

<script>
    let traceInterval = null;
    const logKm = document.getElementById("log-km");
    const logTrace = document.getElementById("log-trace");
    const status = document.getElementById("gps-status");

    function updateStatus(msg, color = "#e0e0e0") {
        status.innerHTML = msg;
        status.style.color = color;
    }

    function savePoint(isManual) {
        const ab = document.getElementById("ab_select").value;
        const kmInput = document.getElementById("km_input");
        const km = isManual ? kmInput.value.replace(',', '.') : "TRACE";

        if (isManual && !km) {
            updateStatus("❗ Bitte KM eingeben", "#ff4444");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude.toFixed(6);
                const lon = pos.coords.longitude.toFixed(6);
                const acc = pos.coords.accuracy;
                const head = pos.coords.heading ? pos.coords.heading.toFixed(0) : "0";
                const zeit = new Date().toLocaleTimeString();
                
                // Auto-Trace nur loggen wenn Genauigkeit unter 15m
                if (acc > 15 && !isManual) return; 

                const entryData = `[${lat}, ${lon}, ${km}], // ${ab} (Acc: ${acc.toFixed(1)}m, Dir: ${head}°, ${zeit})`;
                
                const div = document.createElement("div");
                div.className = "log-entry" + (isManual ? "" : " trace-entry");
                div.innerHTML = `<span>${entryData}</span><button class="btn-x" onclick="this.parentElement.remove()">X</button>`;
                
                const targetLog = isManual ? logKm : logTrace;
                targetLog.insertBefore(div, targetLog.firstChild);

                if (isManual) {
                    updateStatus(`✅ Schild km ${km} erfasst!<br><small>Präzision: ${acc.toFixed(1)}m</small>`, "#00ff00");
                    kmInput.value = "";
                } else {
                    updateStatus(`🛰️ Tracing aktiv...<br><small>Letzter Punkt: ${zeit} (${acc.toFixed(1)}m)</small>`, "#b19cd9");
                }
            },
            (err) => updateStatus("❌ GPS-Fehler: " + err.message, "#ff4444"),
            { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );
    }

    function toggleTracing(active) {
        document.getElementById("startTrace").disabled = active;
        document.getElementById("stopTrace").disabled = !active;
        
        if (active) {
            // Alle 4 Sekunden Messung anfordern
            traceInterval = setInterval(() => savePoint(false), 4000);
            updateStatus("🛰️ Auto-Trace gestartet...", "#b19cd9");
        } else {
            clearInterval(traceInterval);
            updateStatus("⏹️ Tracing beendet.", "#ffffff");
        }
    }

    function copyLog() {
        let text = "--- MANUELLE SCHILDER ---\n";
        document.querySelectorAll("#log-km .log-entry span").forEach(e => text += e.innerText + "\n");
        text += "\n--- GEOMETRIE TRACE ---\n";
        document.querySelectorAll("#log-trace .log-entry span").forEach(e => text += e.innerText + "\n");
        
        if(text.trim().length < 50) {
            alert("Keine Daten zum Kopieren vorhanden.");
            return;
        }

        navigator.clipboard.writeText(text).then(() => alert("✅ Alles kopiert!\nDie Daten sind nun in der Zwischenablage."));
    }
</script>

</body>
</html>
