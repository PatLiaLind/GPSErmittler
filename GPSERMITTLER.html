<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KM-Logger Profi</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #007BFF; margin-bottom: 10px; }
        
        .input-card { background: #2d2d2d; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px 0; font-size: 0.9em; color: #aaa; }

        select, input { 
            width: 100%; padding: 12px; font-size: 20px; border-radius: 10px; 
            border: 2px solid #444; background: #111; color: #00ff00; 
            text-align: center; box-sizing: border-box; margin-bottom: 10px;
        }

        select { color: white; text-align-last: center; }

        button { 
            width: 100%; padding: 18px; font-size: 18px; font-weight: bold; 
            border-radius: 10px; border: none; cursor: pointer; margin-top: 10px;
        }

        .btn-capture { background: #28a745; color: white; }
        .btn-capture:active { background: #1e7e34; transform: scale(0.96); }

        #log-container { margin-top: 10px; }
        #log { 
            width: 100%; background: #000; padding: 10px; border-radius: 8px; 
            font-family: monospace; font-size: 11px; white-space: pre-wrap; 
            color: #00ff00; border: 1px solid #333; max-height: 250px; overflow-y: auto; 
        }
        .status { font-size: 0.85em; text-align: center; margin: 10px 0; color: #ffcc00; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 KM Erfassung</h2>
    
    <div class="input-card">
        <label>Aktuelle Autobahn:</label>
        <select id="ab_select">
            <option value="A1">A1</option>
            <option value="A3">A3</option>
            <option value="A44">A44</option>
            <option value="A46" selected>A46</option>
            <option value="A57">A57</option>
            <option value="A59">A59</option>
            <option value="A535">A535</option>
            <option value="A542">A542</option>
        </select>

        <label>Kilometer vom Schild:</label>
        <input type="number" id="km_input" inputmode="decimal" step="0.1" placeholder="z.B. 105.7">
        
        <button class="btn-capture" onclick="savePoint()">PUNKT SPEICHERN</button>
    </div>

    <div class="status" id="gps-status">Warte auf Eingabe...</div>

    <div id="log-container">
        <div id="log">Noch keine Daten...</div>
        <button style="margin-top: 10px; background: #444; color: white; font-size: 14px; padding: 8px;" onclick="copyLog()">Gesamtes Log kopieren</button>
    </div>
</div>

<script>
    function savePoint() {
        const ab = document.getElementById("ab_select").value;
        const input = document.getElementById("km_input");
        const status = document.getElementById("gps-status");
        const log = document.getElementById("log");
        const kmValue = input.value;

        if (!kmValue) {
            status.innerText = "❗ Bitte Kilometer eingeben!";
            return;
        }

        status.innerText = "⏳ GPS wird fixiert...";

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude.toFixed(6);
                const lon = pos.coords.longitude.toFixed(6);
                const km = kmValue.replace(',', '.');
                
                // Formatierte Ausgabe für dein geoPaths Objekt
                // Wir fügen die Autobahn als Kommentar hinzu, damit du es beim Kopieren sofort zuordnen kannst
                const entry = `[${lat}, ${lon}, ${km}], // ${ab}`;
                
                if (log.innerText === "Noch keine Daten...") {
                    log.innerText = "";
                }
                
                // Neuen Eintrag oben hinzufügen
                log.innerText = entry + "\n" + log.innerText;
                status.innerText = `✅ Gespeichert: ${ab} km ${km}`;
                
                // Eingabefeld für nächstes Schild leeren
                input.value = "";
                // Fokus behalten für schnelle nächste Eingabe
                input.focus();
            },
            (err) => {
                status.innerText = "❌ Fehler: " + err.message;
            },
            {
                enableHighAccuracy: true,
                timeout: 8000,
                maximumAge: 0
            }
        );
    }

    function copyLog() {
        const log = document.getElementById("log").innerText;
        if(log === "Noch keine Daten...") return;
        navigator.clipboard.writeText(log).then(() => {
            alert("Daten kopiert! Du kannst sie jetzt in deine geoPaths einfügen.");
        });
    }
</script>

</body>
</html>
